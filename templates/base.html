<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if video %}{{ video.title }} - {% endif %}小白龙视频</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo">
                <a href="/">🐉 小白龙视频</a>
            </div>
            <nav>
                <ul>
                    <li><a href="/">首页</a></li>
                    {% if user %}
                        <li><a href="{{ url_for('member_center') }}">会员中心</a></li>
                        <li><a href="{{ url_for('logout') }}">退出 ({{ user.username }})</a></li>
                    {% else %}
                        <li><a href="{{ url_for('login') }}">登录</a></li>
                        <li><a href="{{ url_for('register') }}">注册</a></li>
                    {% endif %}
                </ul>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 小白龙视频 | 内容仅供学习交流</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
