{% extends "base.html" %}
{% block content %}

<div class="auth-page">
    <div class="auth-card">
        <h2>注册</h2>
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required placeholder="3位以上">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="6位以上">
            </div>
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>
        <p class="auth-link">已有账号？<a href="{{ url_for('login') }}">去登录</a></p>
    </div>
</div>

{% endblock %}
