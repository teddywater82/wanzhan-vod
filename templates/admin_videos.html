{% extends "admin_base.html" %}
{% block admin_content %}

<div class="admin-header">
    <h1>视频管理</h1>
    <button class="btn btn-primary" onclick="toggleAddForm()">+ 添加视频</button>
</div>

<div id="addVideoForm" class="add-form" style="display:none;">
    <h3>添加新视频</h3>
    <form method="post" action="{{ url_for('admin_video_add') }}" enctype="multipart/form-data">
        <div class="form-group">
            <label>视频标题 *</label>
            <input type="text" name="title" required>
        </div>
        <div class="form-group">
            <label>视频描述</label>
            <textarea name="description" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>分类</label>
            <input type="text" name="category" placeholder="默认">
        </div>
        <div class="form-group">
            <label>排序（越小越靠前）</label>
            <input type="number" name="sort_order" value="0">
        </div>
        <div class="form-group">
            <label>上传视频文件</label>
            <input type="file" name="video_file" accept="video/mp4,video/avi,video/mov">
        </div>
        <div class="form-group">
            <label>或者视频链接（外部URL）</label>
            <input type="text" name="video_url" placeholder="https://example.com/video.mp4">
        </div>
        <div class="form-group">
            <label>封面图片（可选）</label>
            <input type="file" name="cover_file" accept="image/*">
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <button type="button" class="btn btn-secondary" onclick="toggleAddForm()">取消</button>
    </form>
</div>

<table class="admin-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>标题</th>
            <th>分类</th>
            <th>排序</th>
            <th>添加时间</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for video in videos %}
        <tr>
            <td>{{ video.id }}</td>
            <td>{{ video.title }}</td>
            <td>{{ video.category }}</td>
            <td>{{ video.sort_order }}</td>
            <td>{{ video.created_at[:16] }}</td>
            <td>
                <a href="{{ url_for('admin_video_delete', video_id=video.id) }}" class="btn btn-danger btn-sm" onclick="return confirm('确定删除？')">删除</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
function toggleAddForm() {
    const form = document.getElementById('addVideoForm');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
}
</script>

{% endblock %}
