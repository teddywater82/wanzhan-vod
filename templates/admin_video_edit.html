{% extends "admin_base.html" %}
{% block admin_content %}

<div class="admin-header">
    <h1>编辑视频</h1>
</div>

<div class="add-form">
    <form method="post" action="{{ url_for('admin_video_edit', video_id=video.id) }}" enctype="multipart/form-data">
        <div class="form-group">
            <label>视频标题 *</label>
            <input type="text" name="title" value="{{ video.title }}" required>
        </div>
        <div class="form-group">
            <label>视频描述</label>
            <textarea name="description" rows="3">{{ video.description }}</textarea>
        </div>
        <div class="form-group">
            <label>分类</label>
            <input type="text" name="category" value="{{ video.category }}">
        </div>
        <div class="form-group">
            <label>排序（越小越靠前）</label>
            <input type="number" name="sort_order" value="{{ video.sort_order }}">
        </div>
        <div class="row">
            <div class="col">
                <div class="form-group">
                    <label>单集点播价格（¥）</label>
                    <input type="number" name="price" value="{{ video.price or 0 }}" step="0.01" min="0">
                    <span class="form-tip">0表示不单独出售，需买会员</span>
                </div>
            </div>
            <div class="col">
                <div class="form-group">
                    <label>
                        <input type="checkbox" name="free_trial" {% if video.free_trial %}checked{% endif %}>
                        允许免费试看15秒
                    </label>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存修改</button>
            <a href="{{ url_for('admin_videos') }}" class="btn btn-secondary">返回</a>
        </div>
    </form>
</div>

{% endblock %}
